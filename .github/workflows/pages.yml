name: Build and deploy vehicle catalog

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la
          echo "---- package.json ----"
          cat package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean stale install state
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify installed binaries
        run: |
          echo "---- node/npm ----"
          node -v
          npm -v
          echo "---- node_modules/.bin ----"
          ls -la node_modules/.bin
          echo "---- vite location ----"
          test -f node_modules/.bin/vite
          echo "vite exists"

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ vars.BASE_PATH }}

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
